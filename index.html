<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RENNprod — Видеопродакшн</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <video autoplay muted loop playsinline id="bgVideo" class="bg-video">
        <source src="video/1.mp4" type="video/mp4">
    </video>
    
    <canvas id="bgCanvas" class="hero-canvas"></canvas>
    
    <div class="hero-text-overlay">
        <div class="hero-title">RENNprod</div>
    </div>

    <div class="content-wrapper">
        <section class="intro">
            <h2>Снимаем рекламу, клипы, кино и мероприятия.</h2>
            <p>Управляем съёмкой от идеи до монтажа.<br>Технологии, команда, опыт работы с топ-брендами и телеканалами.</p>
        </section>
        
        <section class="video-showcase">
            <div class="video-grid">
                <div class="video-item">
                    <video class="demo-video" controls>
                        <source src="video/2.mp4" type="video/mp4">
                    </video>
                </div>
                <div class="video-item">
                    <video class="demo-video" controls>
                        <source src="video/3.mp4" type="video/mp4">
                    </video>
                </div>
                <div class="video-item">
                    <video class="demo-video" controls>
                        <source src="video/4.mp4" type="video/mp4">
                    </video>
                </div>
            </div>
        </section>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>
    <script type="module" src="js/three-script.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
