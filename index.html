<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>RENNprod — Продакшн полного цикла</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>

    <section class="hero">
        <div class="hero-content">
            <h1 class="stretching-text" id="animatedText">RENNprod</h1>
        </div>
        <div class="scroll-hint">↓ листайте вниз</div>
    </section>

    <section class="about">
        <div class="container">
            <p class="about-text">Снимаем рекламу, клипы, кино и мероприятия.<br>
            Управляем съёмкой от идеи до монтажа.<br>
            Технологии, команда, опыт работы с топ-брендами и телеканалами.</p>
        </div>
    </section>

    <section class="video-grid-section">
        <div class="container">
            <h2 class="section-title">Наши работы</h2>
            <div style="max-width: 800px; margin: 0 auto;">
                <video controls autoplay loop muted playsinline style="width: 100%; height: auto; border-radius: 16px;">
                    <source src="video/1.mp4" type="video/mp4">
                </video>
            </div>
        </div>
    </section>

    <script src="js/script.js"></script>
</body>
</html>
